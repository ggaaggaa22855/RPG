<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Souls of Aerda | RPG с выбором класса</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #1a1f2e, #0a0d16);
            font-family: 'Segoe UI', 'Poppins', 'Cinema', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Главный контейнер */
        .game {
            max-width: 1400px;
            width: 100%;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(210, 180, 140, 0.3);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* Шапка с выбором класса */
        .class-selector {
            background: #03060cee;
            padding: 20px 24px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .class-btn {
            background: linear-gradient(145deg, #232a3f, #11161f);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            font-family: inherit;
            color: #ecd9b4;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #00000055;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .class-btn.active {
            background: linear-gradient(145deg, #c9a03d, #aa7c2c);
            color: #1e1a0c;
            box-shadow: 0 0 12px #ffcd7e;
            border: 1px solid #ffdf9c;
        }

        /* Основная сетка */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            padding: 24px;
        }

        /* Панель героя */
        .hero-card {
            background: #0a0f1bbb;
            border-radius: 32px;
            backdrop-filter: blur(8px);
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .hero-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffdf8c, #c7a23b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .stat-bars {
            margin: 18px 0;
        }

        .bar-container {
            margin: 12px 0;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
            color: #cbd5e6;
        }

        .bar-bg {
            background: #1e2a32;
            border-radius: 30px;
            height: 24px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-weight: bold;
            font-size: 12px;
            color: white;
            transition: width 0.2s ease;
        }

        .hp-fill { background: linear-gradient(90deg, #bc3f2e, #e05a42); }
        .mana-fill { background: linear-gradient(90deg, #2c6e9e, #4aa3cf); }
        .xp-fill { background: linear-gradient(90deg, #8b5cf6, #c084fc); }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #010a1480;
            padding: 14px;
            border-radius: 28px;
            margin: 18px 0;
        }

        .stat-cell {
            text-align: center;
            background: #030b12;
            padding: 8px;
            border-radius: 24px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #f5c542;
        }

        /* Противник */
        .enemy-card {
            background: #120e1ccc;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #b8860b;
        }

        .enemy-name {
            font-size: 28px;
            font-weight: bold;
            color: #e6bc7e;
        }

        .combat-log {
            background: #05080fc9;
            border-radius: 28px;
            padding: 18px;
            height: 380px;
            display: flex;
            flex-direction: column;
        }

        .log-area {
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            background: #00000066;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .log-line {
            border-left: 3px solid #f5b642;
            padding: 6px 10px;
            margin: 6px 0;
            background: #0f0f1e55;
            border-radius: 12px;
        }

        .action-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 12px;
        }

        .game-btn {
            background: #232a3f;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-family: inherit;
            font-size: 16px;
            color: #f7e5c2;
            cursor: pointer;
            transition: 0.1s linear;
            flex: 1;
            min-width: 100px;
        }

        .attack-btn { background: #a1301a; box-shadow: 0 0 6px #ff7744; }
        .skill-btn { background: #2c5282; }
        .heal-btn { background: #2f6b47; }
        .reset-btn { background: #4a2a4e; }

        .game-btn:active { transform: scale(0.96); }

        @media (max-width: 780px) {
            .game-grid { grid-template-columns: 1fr; }
            .class-btn { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="game">
    <div class="class-selector" id="classSelector">
        <button class="class-btn" data-class="warrior">⚔️ ВОИН</button>
        <button class="class-btn" data-class="mage">🔮 МАГ</button>
        <button class="class-btn" data-class="rogue">🗡️ РАЗБОЙНИК</button>
        <button class="class-btn" data-class="archer">🏹 ЛУЧНИК</button>
        <button class="class-btn" data-class="summoner">🐉 ПРИЗЫВАТЕЛЬ</button>
    </div>

    <div class="game-grid">
        <!-- ЛЕВАЯ ПАНЕЛЬ: ГЕРОЙ -->
        <div class="hero-card">
            <div class="hero-title">
                <span id="classNameDisplay">ВОИН</span>
                <span>Уровень <span id="heroLv">1</span></span>
            </div>
            <div class="stat-bars">
                <div class="bar-container">
                    <div class="bar-label">❤️ Здоровье</div>
                    <div class="bar-bg"><div class="bar-fill hp-fill" id="hpFill" style="width: 100%"><span id="hpText">100/100</span></div></div>
                </div>
                <div class="bar-container">
                    <div class="bar-label">🌀 Мана / Энергия</div>
                    <div class="bar-bg"><div class="bar-fill mana-fill" id="manaFill" style="width: 100%"><span id="manaText">50/50</span></div></div>
                </div>
                <div class="bar-container">
                    <div class="bar-label">✨ Опыт</div>
                    <div class="bar-bg"><div class="bar-fill xp-fill" id="xpFill" style="width: 0%"><span id="xpText">0/100</span></div></div>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-cell">💪 СИЛА<br><span class="stat-value" id="statStr">18</span></div>
                <div class="stat-cell">🎯 ЛОВК.<br><span class="stat-value" id="statDex">12</span></div>
                <div class="stat-cell">🧠 ИНТ<br><span class="stat-value" id="statInt">8</span></div>
            </div>
            <div class="stats-row">
                <div class="stat-cell">⚡ КРИТ<br><span class="stat-value" id="critVal">15%</span></div>
                <div class="stat-cell">🛡️ БРОНЯ<br><span class="stat-value" id="armorVal">5</span></div>
                <div class="stat-cell">✨ УКЛОН.<br><span class="stat-value" id="dodgeVal">5%</span></div>
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ: БОЙ И ЛОГ -->
        <div>
            <div class="enemy-card">
                <div class="enemy-name" id="enemyName">Страж пепла</div>
                <div>⭐ Уровень <span id="enemyLv">1</span></div>
                <div class="bar-container">
                    <div class="bar-bg"><div class="bar-fill hp-fill" id="enemyHpFill" style="width: 100%"><span id="enemyHpText">60/60</span></div></div>
                </div>
                <div id="enemyDesc">Пылающий страж пустоши</div>
            </div>

            <div class="combat-log">
                <div class="log-area" id="logArea">
                    <div class="log-line">✨ Добро пожаловать в Souls of Aerda!</div>
                    <div class="log-line">⚔️ Выбери класс и сразись с тьмой.</div>
                </div>
                <div class="action-panel">
                    <button class="game-btn attack-btn" id="attackBtn">⚡ БАЗОВАЯ АТАКА</button>
                    <button class="game-btn skill-btn" id="skillBtn">✨ КЛАССОВОЕ УМЕНИЕ</button>
                    <button class="game-btn heal-btn" id="healBtn">💚 ВОССТАНОВЛЕНИЕ</button>
                    <button class="game-btn reset-btn" id="resetBtn">🔄 ПЕРЕРОДИТЬСЯ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // *************** КЛАССЫ ГЕРОЕВ ***************
    const CLASS_DATA = {
        warrior: {
            name: "ВОИН",
            icon: "⚔️",
            baseStr: 20, baseDex: 12, baseInt: 6,
            maxHp: 140, maxMana: 40,
            armorBonus: 8, dodgeBonus: 3,
            skillName: "💢 Смертельный удар",
            skillDesc: "Мощная атака с игнорированием брони",
            skillCost: 15,
            skillEffect: (hero) => Math.floor(hero.damage * 2.2 + hero.strength * 1.5)
        },
        mage: {
            name: "МАГ",
            icon: "🔮",
            baseStr: 8, baseDex: 10, baseInt: 22,
            maxHp: 85, maxMana: 120,
            armorBonus: 2, dodgeBonus: 5,
            skillName: "🌀 Огненный шар",
            skillDesc: "Наносит магический урон области",
            skillCost: 25,
            skillEffect: (hero) => Math.floor(hero.intellect * 2.8 + hero.damage * 0.7 + 18)
        },
        rogue: {
            name: "РАЗБОЙНИК",
            icon: "🗡️",
            baseStr: 14, baseDex: 22, baseInt: 8,
            maxHp: 105, maxMana: 60,
            armorBonus: 3, dodgeBonus: 18,
            skillName: "🔪 Танец клинков",
            skillDesc: "Двойной удар + яд",
            skillCost: 20,
            skillEffect: (hero) => Math.floor(hero.damage * 1.7 + hero.dexterity * 2.0 + 12)
        },
        archer: {
            name: "ЛУЧНИК",
            icon: "🏹",
            baseStr: 12, baseDex: 20, baseInt: 10,
            maxHp: 100, maxMana: 70,
            armorBonus: 4, dodgeBonus: 12,
            skillName: "🌪️ Пронзающая стрела",
            skillDesc: "Высокий крит. урон",
            skillCost: 18,
            skillEffect: (hero) => Math.floor(hero.damage * 1.9 + hero.dexterity * 1.7 + 10)
        },
        summoner: {
            name: "ПРИЗЫВАТЕЛЬ",
            icon: "🐉",
            baseStr: 10, baseDex: 10, baseInt: 20,
            maxHp: 95, maxMana: 100,
            armorBonus: 3, dodgeBonus: 6,
            skillName: "🐺 Призыв духа",
            skillDesc: "Дух атакует + лечение",
            skillCost: 22,
            skillEffect: (hero) => Math.floor(hero.intellect * 2.2 + hero.damage * 0.9 + 20)
        }
    };

    // ----- ТЕКУЩИЙ ГЕРОЙ -----
    let hero = {
        classId: "warrior",
        level: 1,
        xp: 0,
        xpToNext: 100,
        strength: 20,
        dexterity: 12,
        intellect: 6,
        maxHp: 140,
        hp: 140,
        maxMana: 40,
        mana: 40,
        armor: 8,
        dodge: 3
    };

    let currentEnemy = null;

    // ----- ВРАГИ (масштабируемые) -----
    const ENEMY_TEMPLATES = [
        { name: "Пепельный голем", baseHp: 65, baseAtk: 12, exp: 55, level:1, desc: "Каменная туша" },
        { name: "Теневой убийца", baseHp: 50, baseAtk: 16, exp: 70, level:2, desc: "Быстрый как ночь" },
        { name: "Пламенный маг", baseHp: 58, baseAtk: 18, exp: 90, level:2, desc: "Опаляющее заклинание" },
        { name: "Древний энт", baseHp: 110, baseAtk: 14, exp: 120, level:3, desc: "Кора-броня" },
        { name: "Драконид", baseHp: 140, baseAtk: 22, exp: 180, level:4, desc: "Чешуя пустоты" },
        { name: "Лорд Бездны", baseHp: 210, baseAtk: 30, exp: 280, level:5, desc: "Финал испытания" }
    ];

    function scaleEnemy(template, heroLevel) {
        let scale = 1 + (heroLevel - 1) * 0.22;
        scale = Math.min(scale, 2.4);
        let hp = Math.floor(template.baseHp * scale);
        let atk = Math.floor(template.baseAtk * scale);
        let exp = Math.floor(template.exp * (0.8 + heroLevel * 0.12));
        return {
            name: template.name,
            hp: hp, maxHp: hp,
            atk: atk,
            exp: exp,
            level: template.level + Math.floor(heroLevel / 2),
            desc: template.desc
        };
    }

    function getRandomEnemy() {
        let idx = Math.min(Math.floor(Math.random() * (hero.level + 1)), ENEMY_TEMPLATES.length-1);
        let base = { ...ENEMY_TEMPLATES[idx] };
        return scaleEnemy(base, hero.level);
    }

    // Обновить статы героя согласно классу
    function applyClassStats(classId) {
        let data = CLASS_DATA[classId];
        hero.strength = data.baseStr;
        hero.dexterity = data.baseDex;
        hero.intellect = data.baseInt;
        hero.maxHp = data.maxHp;
        hero.maxMana = data.maxMana;
        hero.hp = hero.maxHp;
        hero.mana = hero.maxMana;
        hero.armor = data.armorBonus;
        hero.dodge = data.dodgeBonus;
        hero.classId = classId;
        // Дополнительные бонусы уровня
        for(let i=1; i<hero.level; i++) levelUpBonuses(false);
        refreshUI();
    }

    function levelUpBonuses(showLog=true) {
        let data = CLASS_DATA[hero.classId];
        hero.strength += 2;
        hero.dexterity += 2;
        hero.intellect += 2;
        hero.maxHp += 18;
        hero.maxMana += 8;
        hero.hp = hero.maxHp;
        hero.mana = hero.maxMana;
        hero.armor += 1;
        if(showLog) addLog(`⭐ УРОВЕНЬ ${hero.level}! +2 ко всем статам, +18HP/+8 маны!`);
    }

    function addLog(msg, isError=false) {
        let logDiv = document.getElementById('logArea');
        let line = document.createElement('div');
        line.className = 'log-line';
        line.style.borderLeftColor = isError ? '#ff7b6e' : '#e5b83c';
        line.innerHTML = `➤ ${msg}`;
        logDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if(logDiv.children.length > 35) logDiv.removeChild(logDiv.children[0]);
    }

    function refreshUI() {
        let hpPercent = (hero.hp / hero.maxHp) * 100;
        let manaPercent = (hero.mana / hero.maxMana) * 100;
        let xpPercent = (hero.xp / hero.xpToNext) * 100;
        document.getElementById('hpFill').style.width = `${hpPercent}%`;
        document.getElementById('manaFill').style.width = `${manaPercent}%`;
        document.getElementById('xpFill').style.width = `${xpPercent}%`;
        document.getElementById('hpText').innerHTML = `${Math.floor(hero.hp)}/${hero.maxHp}`;
        document.getElementById('manaText').innerHTML = `${Math.floor(hero.mana)}/${hero.maxMana}`;
        document.getElementById('xpText').innerHTML = `${hero.xp}/${hero.xpToNext}`;
        document.getElementById('heroLv').innerHTML = hero.level;
        document.getElementById('statStr').innerHTML = hero.strength;
        document.getElementById('statDex').innerHTML = hero.dexterity;
        document.getElementById('statInt').innerHTML = hero.intellect;
        let crit = 10 + Math.floor(hero.dexterity / 2.5);
        document.getElementById('critVal').innerHTML = crit + "%";
        document.getElementById('armorVal').innerHTML = hero.armor;
        document.getElementById('dodgeVal').innerHTML = hero.dodge + "%";
        let className = CLASS_DATA[hero.classId].name;
        document.getElementById('classNameDisplay').innerHTML = `${CLASS_DATA[hero.classId].icon} ${className}`;
        let skillBtn = document.getElementById('skillBtn');
        let skillData = CLASS_DATA[hero.classId];
        skillBtn.innerHTML = `✨ ${skillData.skillName} (${skillData.skillCost} маны)`;
        
        if(currentEnemy) {
            let enemyPercent = (currentEnemy.hp / currentEnemy.maxHp)*100;
            document.getElementById('enemyHpFill').style.width = `${enemyPercent}%`;
            document.getElementById('enemyHpText').innerHTML = `${Math.max(0,Math.floor(currentEnemy.hp))}/${currentEnemy.maxHp}`;
            document.getElementById('enemyName').innerHTML = currentEnemy.name;
            document.getElementById('enemyLv').innerHTML = currentEnemy.level;
            document.getElementById('enemyDesc').innerHTML = currentEnemy.desc;
        }
    }

    function checkLevelUp() {
        let leveled = false;
        while(hero.xp >= hero.xpToNext) {
            hero.xp -= hero.xpToNext;
            hero.level++;
            leveled = true;
            hero.xpToNext = Math.floor(100 + hero.level * 28);
            levelUpBonuses(true);
        }
        if(leveled) refreshUI();
    }

    function heroAttack() {
        if(!currentEnemy || currentEnemy.hp <= 0) { spawnEnemy(); return; }
        let damage = Math.floor(hero.strength * 1.6 + Math.random() * 12);
        let crit = 10 + Math.floor(hero.dexterity / 2.5);
        let isCrit = Math.random() * 100 < crit;
        if(isCrit) { damage = Math.floor(damage * 1.8); addLog(`💥 КРИТИЧЕСКИЙ УДАР!`); }
        let finalDamage = Math.max(6, damage);
        currentEnemy.hp -= finalDamage;
        addLog(`⚔️ Вы нанесли ${finalDamage} урона ${currentEnemy.name}.`);
        refreshUI();
        if(currentEnemy.hp <= 0) enemyDefeated();
        else enemyTurn();
    }

    function useClassSkill() {
        if(!currentEnemy || currentEnemy.hp <= 0) { spawnEnemy(); return; }
        let classData = CLASS_DATA[hero.classId];
        if(hero.mana < classData.skillCost) {
            addLog(`❌ Недостаточно ресурсов! Нужно ${classData.skillCost} маны.`, true);
            return;
        }
        hero.mana -= classData.skillCost;
        let skillDmg = classData.skillEffect(hero);
        let bonusCrit = 20;
        let isCrit = Math.random() * 100 < (10 + hero.dexterity/2.2 + bonusCrit/2);
        if(isCrit) skillDmg = Math.floor(skillDmg * 1.7);
        skillDmg = Math.max(12, Math.floor(skillDmg));
        currentEnemy.hp -= skillDmg;
        addLog(`✨ ${classData.skillName} нанёс ${skillDmg} урона! ${isCrit ? '(КРИТ)' : ''}`);
        refreshUI();
        if(currentEnemy.hp <= 0) enemyDefeated();
        else enemyTurn();
    }

    function healAction() {
        let manaCost = 18;
        if(hero.mana < manaCost) {
            addLog(`❌ Не хватает ${manaCost} маны для восстановления.`, true);
            return;
        }
        hero.mana -= manaCost;
        let healVal = Math.floor(hero.maxHp * 0.32 + hero.intellect * 1.2);
        hero.hp = Math.min(hero.maxHp, hero.hp + healVal);
        addLog(`💚 Вы восстановили ${healVal} HP.`);
        refreshUI();
        enemyTurn();
    }

    function enemyTurn() {
        if(!currentEnemy || currentEnemy.hp <= 0) return;
        let rawDamage = Math.max(5, currentEnemy.atk + Math.floor(Math.random() * 10) - 3);
        let mitigated = Math.max(1, rawDamage - Math.floor(hero.armor / 2.5));
        let dodgeChance = hero.dodge;
        if(Math.random() * 100 < dodgeChance) {
            addLog(`🌀 Уклонение! ${currentEnemy.name} промахнулся!`);
        } else {
            hero.hp = Math.max(0, hero.hp - mitigated);
            addLog(`💢 ${currentEnemy.name} атакует и наносит ${mitigated} урона!`);
        }
        let manaRegen = 5 + Math.floor(hero.intellect / 6);
        hero.mana = Math.min(hero.maxMana, hero.mana + manaRegen);
        addLog(`🌀 Восстановление маны +${manaRegen}`);
        refreshUI();
        if(hero.hp <= 0) {
            addLog(`💀 ВАС ПОГЛОТИЛА ТЬМА... Игра окончена. Переродитесь. 💀`, true);
            disableCombat(true);
        }
    }

    function enemyDefeated() {
        let expGain = currentEnemy.exp;
        hero.xp += expGain;
        addLog(`🏆 Победа! +${expGain} опыта.`);
        checkLevelUp();
        spawnEnemy();
    }

    function spawnEnemy() {
        currentEnemy = getRandomEnemy();
        addLog(`🌑 Появляется ${currentEnemy.name} (ур.${currentEnemy.level}) — ${currentEnemy.desc}`);
        refreshUI();
        disableCombat(false);
    }

    function disableCombat(dead) {
        let btns = ['attackBtn','skillBtn','healBtn'];
        btns.forEach(id => {
            let btn = document.getElementById(id);
            if(btn) btn.disabled = dead;
        });
    }

    function resetGame() {
        hero.level = 1;
        hero.xp = 0;
        hero.xpToNext = 100;
        applyClassStats(hero.classId);
        spawnEnemy();
        refreshUI();
        document.getElementById('logArea').innerHTML = '<div class="log-line">🌀 Перерождение... Начни новую сагу!</div>';
        addLog(`✨ Вы переродились как ${CLASS_DATA[hero.classId].name}.`);
        disableCombat(false);
    }

    function changeClass(classId) {
        hero.classId = classId;
        hero.level = 1;
        hero.xp = 0;
        hero.xpToNext = 100;
        applyClassStats(classId);
        spawnEnemy();
        refreshUI();
        addLog(`⚔️ Вы приняли путь ${CLASS_DATA[classId].name}.`);
        // подсветка активного класса
        document.querySelectorAll('.class-btn').forEach(btn => {
            if(btn.dataset.class === classId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // ИНИЦИАЛИЗАЦИЯ И СОБЫТИЯ
    document.querySelectorAll('.class-btn').forEach(btn => {
        btn.addEventListener('click', () => changeClass(btn.dataset.class));
    });
    document.getElementById('attackBtn').onclick = () => { if(hero.hp>0 && currentEnemy?.hp>0) heroAttack(); };
    document.getElementById('skillBtn').onclick = () => { if(hero.hp>0 && currentEnemy?.hp>0) useClassSkill(); };
    document.getElementById('healBtn').onclick = () => { if(hero.hp>0 && currentEnemy) healAction(); };
    document.getElementById('resetBtn').onclick = () => resetGame();

    // старт игры
    changeClass('warrior');
</script>
</body>
</html>
